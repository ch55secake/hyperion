name: Python CI

on:
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - tests/**
  push:
    paths:
      - src/**
      - tests/**
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: |
          echo "Checking formatting......."
          if ! uv run ruff format . --check --diff; then
            echo ""
            echo "❌ Code formatting issues found."
            echo "💡 Please run 'uv run ruff format .' locally to fix formatting."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

  test:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: |
          uv run pytest tests/ -v --tb=short -m "not regression" \
            --cov=src --cov-report=term-missing --cov-fail-under=40

  regression-tests:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run regression tests
        run: |
          uv run pytest tests/ -v --tb=short -m regression
